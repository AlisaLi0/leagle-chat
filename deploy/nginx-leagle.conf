# nginx reverse-proxy for leagle-chat (product: JuriCodex).
#
# Production runs a DEDICATED domain (juricodex.online) serving the app at the
# root, same-origin: the backend on 127.0.0.1:8600 serves both the static
# frontend and the /api/* routes, so requests, cookies and the OAuth callback
# are all first-party. Paste the location below into the HTTPS server block for
# juricodex.online (certbot manages the listen 443 / ssl_certificate lines).
#
# CORS is handled by the FastAPI app (LEAGLE_CORS_ORIGINS). Do NOT add CORS
# headers here or they would duplicate the app's and browsers would reject them.
#
# proxy_buffering off + chunked_transfer_encoding on keep the SSE token stream
# flowing (also fine through Cloudflare).
#
# Behind Cloudflare: this host defines $real_client_ip in nginx.conf from
# CF-Connecting-IP with a $remote_addr fallback. Forward that to the backend;
# otherwise the backend's per-IP chat limit sees Cloudflare edge IPs instead of
# visitors.
#
# Public access: do not use nginx basic-auth here. The app is public and account
# gates are enforced by signed OAuth sessions in the backend.

# Recommended server-level hardening for the juricodex.online HTTPS server block:
#   server_tokens off;
#   add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
#   add_header X-Content-Type-Options "nosniff" always;
#   add_header X-Frame-Options "DENY" always;
#   add_header Referrer-Policy "strict-origin-when-cross-origin" always;
#   add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
#   add_header Content-Security-Policy-Report-Only "default-src 'self'; script-src 'self' 'unsafe-inline' https://code.jquery.com https://checkout.freemius.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; media-src 'self' data: blob:; connect-src 'self' https://checkout.freemius.com https://api.freemius.com; frame-src https://checkout.freemius.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self' https://checkout.freemius.com; report-uri /api/csp-report" always;

location / {
    proxy_pass http://127.0.0.1:8600/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $real_client_ip;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 600s;
    chunked_transfer_encoding on;
}
